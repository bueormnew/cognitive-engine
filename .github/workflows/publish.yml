name: Publish to PyPI

on:
  release:
    types: [published]
  # Permite ejecutarlo manualmente desde la pestaña Actions
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    
    # Necesario para Trusted Publishing de PyPI
    permissions:
      id-token: write 
      contents: read

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias de build
        run: >-
          python -m pip install --upgrade pip
          && pip install build twine

      - name: Construir el paquete (sdist y wheel)
        run: python -m build

      - name: Verificar el paquete
        run: twine check dist/*

      - name: Publicar en PyPI
        # Esta acción utiliza Trusted Publishing si configuraste OIDC en PyPI,
        # o puedes usar un token tradicional configurando el secret PYPI_API_TOKEN.
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
